<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Stock Market App</title>
    <script>
      // GitHub Pages SPA redirect: store the path in sessionStorage then redirect to index
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') + (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash);
    </script>
  </head>
</html>
